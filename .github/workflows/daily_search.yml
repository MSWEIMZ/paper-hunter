name: Daily Paper Search

on:
  schedule:
    # 默认每天北京时间早上 8 点 (UTC 0:00)。修改时间需编辑此 cron。
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  search-papers:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PYTHONPATH: ${{ github.workspace }}/src

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Run daily search for all profiles
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          for profile in profiles/*.json; do
            if [ -f "$profile" ]; then
              echo "=========================================="
              echo "Processing: $profile"
              echo "=========================================="
              python -m paper_hunter.cli run-daily "$profile"
            fi
          done

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -d output ]; then
            git add output/
          else
            echo "No output directory was generated."
            exit 0
          fi
          if git diff --cached --quiet; then
            echo "No output changes to commit."
            exit 0
          fi
          timestamp=$(date -u +"%Y-%m-%d %H:%M:%S")
          git commit -m "auto: update papers ($timestamp)"
          git push
