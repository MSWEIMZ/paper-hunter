name: Daily Paper Search

on:
  schedule:
    # 默认每天北京时间早上 8 点 (UTC 0:00)
    # 用户可以在 profiles/xxx.json 的 schedule.cron 中自定义
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  search-papers:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily search for all profiles
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          for profile in profiles/*.json; do
            if [ -f "$profile" ]; then
              echo "=========================================="
              echo "Processing: $profile"
              echo "=========================================="
              python -m paper_hunter.cli run-daily "$profile" || true
            fi
          done

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          timestamp=$(date -u +"%Y-%m-%d %H:%M:%S")
          git diff --cached --quiet || git commit -m "auto: update papers ($timestamp)"
          git push
